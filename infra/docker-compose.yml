services:
  backend:
    container_name: typing-trainer-backend
    build:
      context: ..
      dockerfile: Dockerfile
    restart: always
    volumes:
      - backend_static:/app/backend/static/
      - backend_media:/app/backend/media/
    depends_on:
      - db
    env_file:
      - ../.env
    ports:
      - "8000:8000"

  frontend:
    container_name: typing-trainer-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_static:/frontend_static
  db:
    image: postgres:14
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ../.env
    restart: always
    ports:
      - "5433:5432"

  nginx:
    container_name: typing-trainer-proxy
    image: nginx:1.25.4-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - frontend_static:/usr/share/nginx/html/web/build/:ro
      - backend_static:/usr/share/nginx/html/static/:ro
      - backend_media:/usr/share/nginx/html/media/:ro
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  postgres_data:
  backend_static:
  backend_media:
  frontend_static:
